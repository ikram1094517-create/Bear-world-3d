const obstacles = [];

const automaticDoors = [];



// جزء إنشاء الدببة الإضافية (NPC) وتلوينها بألوان عشوائية

const npcBears = [];

const bearColors = [0xffffff, 0xffcccc, 0xd2b48c, 0x63472b, 0x222222, 0xffce00]; 

for(let i = 0; i < 15; i++) { 

    const npc = bear.clone(true);



    // اختيار لون عشوائي وتطبيقه
    const randomColor = bearColors[Math.floor(Math.random() * bearColors.length)];
    
    npc.traverse((child) => {
        if (child.isMesh && child.material.color.getHex() === 0xffffff) { 
            child.material = child.material.clone(); 
            child.material.color.setHex(randomColor);
        }
    });

    npc.position.set(
        Math.random() * 200 - 100,
        0,
        Math.random() * 200 - 100
    );

    scene.add(npc);
    npcBears.push({ mesh: npc, direction: Math.random() * Math.PI * 2 });
    obstacles.push(npc); // منع اختراق الدببة لبعضها
}

    const keys = { fwd: false, bwd: false, lft: false, rgt: false };

const setupInput = (id, key) => {
    const el = document.getElementById(id);
    if(el) {
        el.onpointerdown = () => keys[key] = true;
        el.onpointerup = () => keys[key] = false;
    }
};


window.addEventListener("pointerup", () => {
    keys.fwd = false;
    keys.bwd = false;
    keys.lft = false;
    keys.rgt = false;
});

    setupInput('btnUp', 'fwd'); setupInput('btnDown', 'bwd');
    setupInput('btnLeft', 'lft'); setupInput('btnRight', 'rgt');

    window.onkeydown = (e) => {
        if(e.code === 'KeyW' || e.code === 'ArrowUp') keys.fwd = true;
        if(e.code === 'KeyS' || e.code === 'ArrowDown') keys.bwd = true;
        if(e.code === 'KeyA' || e.code === 'ArrowLeft') keys.lft = true;
        if(e.code === 'KeyD' || e.code === 'ArrowRight') keys.rgt = true;
    };
    window.onkeyup = (e) => {
        if(e.code === 'KeyW' || e.code === 'ArrowUp') keys.fwd = false;
        if(e.code === 'KeyS' || e.code === 'ArrowDown') keys.bwd = false;
        if(e.code === 'KeyA' || e.code === 'ArrowLeft') keys.lft = false;
        if(e.code === 'KeyD' || e.code === 'ArrowRight') keys.rgt = false;
    };


    const speed = 0.2;
    const turn = 0.04;
    let cameraPos = new THREE.Vector3();


let cameraYaw = 0;
let cameraPitch = 0;


let touchStartX = 0;
let touchStartY = 0;



let inventory = localStorage.getItem("inventory")
    ? JSON.parse(localStorage.getItem("inventory"))
    : [];



window.addEventListener("touchstart", e=>{

    touchStartX =
 e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
});



window.addEventListener("touchmove", e => {
    if (e.target.classList.contains('btn')) return; 

    const dx = e.touches[0].clientX - touchStartX;
    const dy = e.touches[0].clientY - touchStartY;

    
    cameraYaw -= dx * 0.008;
    cameraPitch += dy * 0.008; 


    cameraPitch = Math.max(0.1, Math.min(1.5, cameraPitch));

    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
}, { passive: false });

window.addEventListener("click", (event)=>{
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();

    mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

    raycaster.setFromCamera(mouse, camera);

    const intersects = raycaster.intersectObjects(placedItems, true);


    if(intersects.length > 0){
        const clickedItem = intersects[0].object;


        let now = Date.now();

        
        if(now - lastClickTime < 300){
            selectedItem = clickedItem;
            showDeleteButton();
        }

        lastClickTime = now;
    }
});

            <div style="color:#ffce00; margin:5px 0;">${item.price} دج</div>
            <button onclick="buyProduct('${item.type}', ${item.price})" style="background:#ffce00; border:none; padding:8px 20px; border-radius:5px; font-weight:bold; cursor:pointer; width:100%;">شراء الآن</button>
        </div>`;
    });

    document.getElementById("shopItems").innerHTML = html;
    document.getElementById("shopCategories").style.display = "none";
}

window.buyProduct = function(type, price) {
    if (money < price) {
        alert("⚠️ عذراً! ليس لديك مال كافي.");
        return;
    }

    money -= price;

updateMoneyUI();

localStorage.setItem("money", money); 

inventory.push(type);

   
    localStorage.setItem("inventory", JSON.stringify(inventory));

    alert("🛒 تم الشراء! الرصيد المتبقي: " + money + " دج");
};

function showDeleteButton(){

    let btn = document.getElementById("deleteBtn");

    if(!btn){
        btn = document.createElement("button");
        btn.id = "deleteBtn";
        btn.innerText = "🗑️ ";

        btn.style.position = "fixed";
        btn.style.bottom = "100px";
        btn.style.left = "50%";
        btn.style.transform = "translateX(-50%)";
        btn.style.padding = "10px";
        btn.style.background = "red";
        btn.style.color = "white";
        btn.style.border = "none";
        btn.style.zIndex = "200";

        document.body.appendChild(btn);

        btn.onclick = () => {
            if(selectedItem){
                scene.remove(selectedItem);

                // نحذفه من القائمة
                placedItems = placedItems.filter(i => i !== selectedItem);

                selectedItem = null;
                btn.style.display = "none";
            }
        };
    }

    btn.style.display = "block";
}





function checkCollision(obj) {
    const box1 = new THREE.Box3().setFromObject(obj);

    for (let o of obstacles) {
        const box2 = new THREE.Box3().setFromObject(o);

        if (box1.intersectsBox(box2)) {
            return true;
        }
    }
    return false;
}



function placeItem(type){

let item;

if(type === "tv"){
    item = new THREE.Mesh(
        new THREE.BoxGeometry(1.5,1,0.3),
        new THREE.MeshStandardMaterial({color:0x222222})
    );
}

if(type === "sofa"){
    item = new THREE.Mesh(
        new THREE.BoxGeometry(2,1,1),
        new THREE.MeshStandardMaterial({color:0x884422})
    );
}

if(type === "lamp"){
    item = new THREE.Mesh(
        new THREE.CylinderGeometry(0.1,0.1,2),
        new THREE.MeshStandardMaterial({color:0xffffaa})
    );
}

if(type === "bed"){
    item = new THREE.Mesh(
        new THREE.BoxGeometry(2,0.3,2),
        new THREE.MeshStandardMaterial({color:0x8d6e63})
    );
}

if(type === "food"){
    item = new THREE.Mesh(
        new THREE.BoxGeometry(1,0.2,1),
        new THREE.MeshStandardMaterial({color:0x4caf50})
    );
}


if(type === "farm"){
    item = new THREE.Mesh(
        new THREE.BoxGeometry(2,0.1,2),
        new THREE.MeshStandardMaterial({color:0x6d4c41})
    );
}


if(!item) return;

item.position.copy(bear.position);
item.position.y = 0;

scene.add(item);

placedItems.push(item);


placedItemsData.push({
    type: type,
    x: item.position.x,
    y: item.position.y,
    z: item.position.z
});

localStorage.setItem("placedItems", JSON.stringify(placedItemsData));
}

function createHuman(){
    const human = new THREE.Mesh(
        new THREE.CapsuleGeometry(0.5,1.5,8,16),
        new THREE.MeshStandardMaterial({color:0x00aaff})
    );
    human.position.set(Math.random()*200-100, 1, Math.random()*200-100);
    scene.add(human);
    
    obstacles.push(human); 
}

function checkCarEntry() {
    if(currentCar) return; 

    cars.forEach(car => {
        if (bear.position.distanceTo(car.position) < 3) {
            currentCar = car;
        }
    });
}

let currentCar = null;
  
let gameLoaded = false;

gameLoaded = true;

function animate() {
    requestAnimationFrame(animate);
    
    let time = performance.now() * 0.01;

    if (soundOn && isGrounded && (keys.fwd || keys.bwd || keys.lft || keys.rgt) && !currentCar) {
     
   if (stepSound.paused) stepSound.play();
    } else {
        stepSound.pause();
    }

    
    if (!currentCar) {

if (keys.jump && isGrounded) {
    verticalVelocity = jumpForce;
    isGrounded = false;
    keys.jump = false; 
}

        verticalVelocity += gravity;
        bear.position.y += verticalVelocity;

        if (bear.position.y <= 0) {
            bear.position.y = 0;
            verticalVelocity = 0;
            isGrounded = true;
        }
    }

if (currentCar) {
   
    exitBtn.style.display = "block";
    bear.visible = false;
    
    if (keys.fwd) currentCar.translateZ(0.5);
    if (keys.bwd) currentCar.translateZ(-0.3);
    if (keys.lft) currentCar.rotation.y += 0.04;
    if (keys.rgt) currentCar.rotation.y -= 0.04;

    bear.position.copy(currentCar.position);

} else {
  
    exitBtn.style.display = "none";
    bear.visible = true;
    checkCarEntry();

    if (gameLoaded && (keys.fwd || keys.bwd || keys.lft || keys.rgt)) {

   
        legL.rotation.x = Math.sin(time * 12) * 0.6;
        legR.rotation.x = Math.sin(time * 12 + Math.PI) * 0.6;

   
        armL.rotation.x = Math.sin(time * 12 + Math.PI) * 0.4;
        armR.rotation.x = Math.sin(time * 12) * 0.4;

      
        let targetRotation = cameraYaw + Math.PI;
        if (keys.bwd) targetRotation += Math.PI;
        if (keys.lft) targetRotation += Math.PI / 4;
        if (keys.rgt) targetRotation -= Math.PI / 4;

        bear.rotation.y = THREE.MathUtils.lerp(
            bear.rotation.y,
            targetRotation,
            0.1
        );

 
        bear.translateZ(moveSpeed);

        if (checkCollision(bear)) {
            bear.translateZ(-moveSpeed);
        }

    } else {
      
        legL.rotation.x = THREE.MathUtils.lerp(legL.rotation.x, 0, 0.1);
        legR.rotation.x = THREE.MathUtils.lerp(legR.rotation.x, 0, 0.1);

        armL.rotation.x = THREE.MathUtils.lerp(armL.rotation.x, 0, 0.1);
        armR.rotation.x = THREE.MathUtils.lerp(armR.rotation.x, 0, 0.1);
    }
}


            
  

    [...npcBears, ...pigs, ...ducks].forEach(npc => {

obj.translateZ(0.12);
